packages:
  - packages/*
  - apps/*

allowBuilds:
  '@parcel/watcher': true
  esbuild: true

link-workspace-packages: true

onlyBuiltDependencies:
  - '@parcel/watcher'
  - '@tailwindcss/oxide'
  - esbuild
  - msw
  - unrs-resolver

minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - tanstack-router-ga4
  - hdrify*
  - yargs-file-commands
  - humanize-units
  - fastify-file-router
  - fastify-http-exceptions
  - bhouston-profiler
  - bhouston-markdown
  - axios-eventsource
  - vite-file-commands
